<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👩‍🏫 Panel Docente — 6to Grado</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f7ff;--white:#fff;--blue:#2563eb;--blue-l:#dbeafe;--blue-d:#1d4ed8;--green:#16a34a;--green-l:#dcfce7;--gold:#d97706;--gold-l:#fef3c7;--red:#dc2626;--red-l:#fee2e2;--purple:#7c3aed;--purple-l:#ede9fe;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.login-box{background:var(--white);border-radius:20px;padding:2.5rem 2rem;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.1);}
.login-box h1{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--blue);margin-bottom:.3rem;}
.l-inp{width:100%;border:2px solid var(--border);border-radius:10px;padding:.7rem 1rem;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;outline:none;margin-bottom:.8rem;transition:border-color .2s;}
.l-inp:focus{border-color:var(--blue);}
.l-btn{width:100%;padding:.7rem;border-radius:12px;border:none;background:var(--blue);color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:.95rem;cursor:pointer;}
.l-btn:hover{background:var(--blue-d);}
.l-err{color:var(--red);font-size:.82rem;font-weight:700;margin-top:.5rem;display:none;}
#appScreen{display:none;flex-direction:column;min-height:100vh;}
#appScreen.active{display:flex;}
header{background:linear-gradient(135deg,#1d4ed8,#7c3aed);padding:1rem 1.5rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;flex-shrink:0;}
header h1{font-family:'Fredoka One',cursive;font-size:1.2rem;color:#fff;flex:1;}
.live-b{display:flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.15);border-radius:999px;padding:.25rem .7rem;font-size:.72rem;font-weight:800;color:#fff;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#34d399;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.hdr-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;padding:.3rem .7rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:.73rem;cursor:pointer;}
.hdr-btn:hover{background:rgba(255,255,255,.28);}
.hdr-btn.gold{background:rgba(245,158,11,.35);border:1px solid rgba(245,158,11,.5);}
.tabs{display:flex;background:var(--white);border-bottom:2px solid var(--border);flex-shrink:0;overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:.72rem 1.1rem;border:none;background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;position:relative;}
.tab:hover{color:var(--blue);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab .bdg{position:absolute;top:6px;right:6px;background:var(--red);color:#fff;border-radius:999px;font-size:.55rem;font-weight:900;padding:.1rem .35rem;min-width:14px;text-align:center;}
.tab-pane{display:none;flex:1;}
.tab-pane.active{display:block;}
.pw{padding:1.5rem;max-width:1100px;margin:0 auto;}
.card{background:var(--white);border:2px solid var(--border);border-radius:16px;padding:1rem;}
.chip{display:inline-flex;align-items:center;gap:.25rem;font-size:.7rem;font-weight:800;padding:.18rem .55rem;border-radius:999px;}
.chip.green{background:var(--green-l);color:var(--green);}
.chip.gold{background:var(--gold-l);color:var(--gold);}
.chip.red{background:var(--red-l);color:var(--red);}
.chip.blue{background:var(--blue-l);color:var(--blue);}
.chip.gray{background:#f1f5f9;color:var(--muted);}
.btn{padding:.45rem 1rem;border-radius:9px;border:none;font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;cursor:pointer;transition:all .2s;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:var(--blue-d);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#15803d;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);}
.btn-red{background:var(--red-l);color:var(--red);border:1.5px solid rgba(220,38,38,.2);}
.stats-bar{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.2rem;padding:1rem 1.1rem;background:var(--white);border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.sbox{display:flex;flex-direction:column;align-items:center;min-width:60px;}
.sn{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--blue);}
.sl{font-size:.65rem;font-weight:700;color:var(--muted);text-align:center;}
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.filter-bar input{flex:1;min-width:160px;border:2px solid var(--border);border-radius:10px;padding:.45rem .8rem;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;outline:none;}
.filter-bar input:focus{border-color:var(--blue);}
.f-btn{padding:.4rem .8rem;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;font-size:.74rem;cursor:pointer;transition:all .2s;}
.f-btn.active,.f-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l);}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.8rem;}
.sc{background:var(--white);border:2px solid var(--border);border-radius:16px;padding:.9rem;cursor:pointer;transition:all .2s;}
.sc:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(37,99,235,.1);}
.sc.ahead{border-color:rgba(22,163,74,.3);}
.sc.behind{border-color:rgba(220,38,38,.2);}
.sc.pending{border-color:rgba(217,119,6,.4);}
.sc-bar{background:#f1f5f9;border-radius:999px;height:6px;overflow:hidden;margin:.35rem 0 .4rem;}
.sc-bar-f{height:100%;border-radius:999px;}
.sc-cats{display:flex;flex-wrap:wrap;gap:.2rem;}
.sc-cat{font-size:.63rem;font-weight:800;padding:.1rem .38rem;border-radius:5px;}
.sc-cat.done{background:var(--green-l);color:var(--green);}
.sc-cat.partial{background:var(--gold-l);color:var(--gold);}
.sc-cat.todo{background:#f1f5f9;color:var(--muted);}
.pb-b{background:#f1f5f9;color:var(--gold);border-radius:999px;font-size:.65rem;font-weight:900;padding:.1rem .4rem;}
#tabBracket .pw{overflow-x:auto;}
.bk-scroll{min-width:820px;max-width:1060px;margin:0 auto;}
.bk-row{display:flex;align-items:stretch;}
.bk-col{flex:1;display:flex;flex-direction:column;}
.bk-lbl{text-align:center;margin-bottom:.8rem;}
.bk-lbl span{font-family:'Fredoka One',cursive;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:.2rem .75rem;display:inline-block;}
.bk-matches{display:flex;flex-direction:column;flex:1;}
.bk-match{flex:1;display:flex;align-items:center;padding:.2rem 6px;}
.bk-card{background:var(--white);border:2px solid var(--border);border-radius:10px;padding:.45rem .65rem;font-size:.75rem;font-weight:800;display:flex;align-items:center;gap:.35rem;width:100%;min-height:38px;}
.bk-card.done-c{border-color:rgba(22,163,74,.4);background:var(--green-l);}
.bk-card.in-p{border-color:rgba(37,99,235,.3);background:var(--blue-l);}
.bk-conn{width:18px;flex-shrink:0;}
.bk-champ{flex:0 0 110px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 .4rem;}
.av-ph-btn{padding:.38rem .85rem;border-radius:999px;border:2px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;font-size:.76rem;cursor:pointer;margin-right:.35rem;margin-bottom:.35rem;}
.av-ph-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.av-act-row{display:flex;align-items:flex-start;gap:.6rem;padding:.45rem .6rem;border-radius:9px;border:1.5px solid var(--border);margin-bottom:.35rem;font-size:.78rem;font-weight:700;}
.av-act-row.game{background:#f0fdf4;border-color:rgba(22,163,74,.2);}
.av-act-row.extra{background:var(--purple-l);}
.ed-sec{border-radius:10px;padding:.7rem .9rem;margin-bottom:.7rem;}
.ed-sec.theory{background:#fffbeb;border:1.5px solid #fde68a;}
.ed-sec.acts{background:var(--blue-l);border:1.5px solid rgba(37,99,235,.2);}
.ed-sec.game{background:var(--green-l);border:1.5px solid rgba(22,163,74,.2);}
.ed-sec.extras{background:var(--purple-l);border:1.5px solid rgba(124,58,237,.2);}
.ed-sec h4{font-size:.74rem;font-weight:900;margin-bottom:.55rem;}
.ed-sec.theory h4{color:var(--gold);}
.ed-sec.acts h4{color:var(--blue);}
.ed-sec.game h4{color:var(--green);}
.ed-sec.extras h4{color:var(--purple);}
.act-block{background:#f8fafc;border:1.5px solid var(--border);border-radius:9px;padding:.6rem .75rem;margin-bottom:.45rem;}
.act-block.game-b{background:#f0fdf4;border-color:rgba(22,163,74,.2);}
.act-block.extra-b{background:var(--purple-l);border-color:rgba(124,58,237,.2);}
.act-block-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;}
.act-block-ttl{font-size:.73rem;font-weight:900;color:var(--blue);}
.act-block.game-b .act-block-ttl{color:var(--green);}
.act-block.extra-b .act-block-ttl{color:var(--purple);}
.f-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.35rem;}
.fg{display:flex;flex-direction:column;flex:1;min-width:100px;}
.fg label{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.18rem;}
.fi,.fs,.ft{border:1.5px solid var(--border);border-radius:7px;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;padding:.32rem .5rem;outline:none;width:100%;transition:border-color .2s;background:var(--white);color:var(--text);}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--blue);}
.ft{resize:vertical;min-height:38px;}
.fi.dl-f{background:#fff7ed;border-color:#fed7aa;}
.cat-name-inp{width:100%;border:2px solid rgba(37,99,235,.3);border-radius:9px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:900;padding:.4rem .7rem;color:var(--blue);background:var(--blue-l);outline:none;margin-bottom:.9rem;}
.cat-name-inp:focus{border-color:var(--blue);}
.save-bar{position:sticky;bottom:0;background:var(--white);border-top:2px solid var(--border);padding:.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;box-shadow:0 -4px 12px rgba(0,0,0,.08);z-index:50;}
.dl-table{width:100%;border-collapse:collapse;font-size:.78rem;}
.dl-table th{text-align:left;font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:.35rem .6rem;border-bottom:2px solid var(--border);}
.dl-table td{padding:.38rem .6rem;border-bottom:1px solid var(--border);font-weight:700;vertical-align:middle;}
.grade-panel{background:var(--white);border:2px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:.8rem;}
.gb{padding:.42rem .9rem;border-radius:9px;border:2px solid var(--border);background:transparent;font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;cursor:pointer;transition:all .2s;margin-right:.35rem;margin-bottom:.35rem;}
.gb.sel-excelente{background:var(--gold-l);border-color:var(--gold);color:var(--gold);}
.gb.sel-muyBien{background:var(--green-l);border-color:var(--green);color:var(--green);}
.gb.sel-enProceso{background:var(--blue-l);border-color:var(--blue);color:var(--blue);}
.gb.sel-rehacer{background:var(--red-l);border-color:var(--red);color:var(--red);}
.fb-inp{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:.4rem .7rem;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;outline:none;resize:none;margin-bottom:.5rem;}
.fb-inp:focus{border-color:var(--blue);}
.det-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
.det-ov.open{display:flex;}
.det-pan{background:var(--white);border-radius:20px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;padding:1.5rem;animation:sUp .3s ease;position:relative;}
@keyframes sUp{from{transform:translateY(20px);opacity:0;}to{transform:none;opacity:1;}}
.det-x{position:absolute;top:.8rem;right:1rem;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted);}
.podio-wrap{background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:20px;padding:2rem;text-align:center;margin-bottom:1.5rem;}
.podio-places{display:flex;align-items:flex-end;justify-content:center;gap:1rem;}
.podio-place{display:flex;flex-direction:column;align-items:center;gap:.4rem;}
.podio-av{font-size:2rem;width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.podio-ped{border-radius:10px 10px 0 0;display:flex;align-items:flex-end;justify-content:center;padding:.4rem;}
.podio-ped.first{background:rgba(245,158,11,.5);height:80px;width:70px;}
.podio-ped.second{background:rgba(255,255,255,.2);height:60px;width:65px;}
.podio-ped.third{background:rgba(255,255,255,.12);height:44px;width:65px;}
#projectionScreen{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);z-index:1000;align-items:center;justify-content:center;flex-direction:column;padding:2rem;}
#projectionScreen.open{display:flex;}
.proj-close{position:absolute;top:1rem;right:1.5rem;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:10px;padding:.5rem 1rem;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;font-size:.85rem;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-weight:900;padding:.55rem 1.4rem;border-radius:999px;font-size:.88rem;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;}
.toast.show{opacity:1;}
@media(max-width:600px){.sg{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:.5rem">👩‍🏫</div>
    <h1>Panel Docente</h1>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:1.5rem">6to Grado — Acceso exclusivo</p>
    <input class="l-inp" type="password" id="passInp" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="l-btn" onclick="doLogin()">Ingresar</button>
    <div class="l-err" id="loginErr">Contraseña incorrecta</div>
  </div>
</div>
<div id="appScreen">
  <header>
    <h1>👩‍🏫 Panel Docente — Fixture 6to Grado</h1>
    <div class="live-b"><div class="live-dot"></div>En vivo</div>
    <button class="hdr-btn gold" onclick="openProj()">🖥️ Proyectar</button>
    <button class="hdr-btn" onclick="expXls()">📤 Excel</button>
    <button class="hdr-btn" onclick="doLogout()">Salir</button>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="goTab('Students')">👥 Alumnos</button>
    <button class="tab" onclick="goTab('ToCorrect')">📬 Para corregir<span class="bdg" id="pendBdg" style="display:none">0</span></button>
    <button class="tab" onclick="goTab('Bracket')">🏆 Bracket</button>
    <button class="tab" onclick="goTab('ActView')">📊 Por actividad</button>
    <button class="tab" onclick="goTab('Deadlines')">📅 Fechas</button>
    <button class="tab" onclick="goTab('Editor')">✏️ Contenido</button>
    <button class="tab" onclick="goTab('Podio')">🥇 Podio</button>
  </div>
  <div class="tab-pane active" id="tabStudents"></div>
  <div class="tab-pane" id="tabToCorrect"></div>
  <div class="tab-pane" id="tabBracket"></div>
  <div class="tab-pane" id="tabActView"></div>
  <div class="tab-pane" id="tabDeadlines"></div>

  <div id="projPodio" style="display:flex;align-items:flex-end;justify-content:center;gap:2rem;margin-bottom:2rem"></div>
  <div id="projBars" style="width:100%;max-width:800px"></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FC={apiKey:"AIzaSyDrtAx6wC307Dy8JcqwWL25MHJ_6rfSQSs",authDomain:"fixture-fd586.firebaseapp.com",projectId:"fixture-fd586",storageBucket:"fixture-fd586.firebasestorage.app",messagingSenderId:"877771262749",appId:"1:877771262749:web:db2142b76393b7db67eff4"};
const db=getFirestore(initializeApp(FC));

// Prefijo 6to — datos completamente separados del fixture de 4to/5to
const P="6to";
const CS=P+"_students", CI=P+"_index", CC=P+"_config";

const PASS="Colegio2026";
const PC=['#2563eb','#d97706','#7c3aed','#d97706'];
const RN=['Octavos','Cuartos','Semifinal','Final'];
const GI={excelente:{e:'⭐',l:'Excelente',m:'🥇'},muyBien:{e:'✅',l:'Muy bien',m:'🥈'},enProceso:{e:'📝',l:'En proceso',m:null},rehacer:{e:'🔄',l:'Rehacer',m:null}};
const TL={actividad:'Actividad',video:'Video',juego:'Juego',extra:'Extra'};

let FX=null, students=[], edPh=0, avPh=0, filt='all', unsub=null, podioOn=false, gSel={};

function dFx(){
  const mk=(id)=>({id,name:'',icon:'📚',theory:[{label:'Video explicativo',url:''},{label:'Apunte PDF',url:''}],
    activities:[{id:`${id}_a1`,name:'Actividad 1',type:'actividad',desc:'',link:'',deadline:''},{id:`${id}_a2`,name:'Actividad 2',type:'actividad',desc:'',link:'',deadline:''},{id:`${id}_a3`,name:'Actividad 3',type:'actividad',desc:'',link:'',deadline:''},{id:`${id}_a4`,name:'Actividad 4',type:'actividad',desc:'',link:'',deadline:''}],
    game:{id:`${id}_g`,name:'Juego',type:'juego',desc:'',link:'',deadline:''},extras:[]});
  return{phases:[
    {id:'oct',name:'Octavos de Final',emoji:'🌱',categories:[mk('6c1'),mk('6c2'),mk('6c3'),mk('6c4')]},
    {id:'cua',name:'Cuartos de Final',emoji:'🔥',categories:[mk('6c5'),mk('6c6'),mk('6c7'),mk('6c8')]},
    {id:'sem',name:'Semifinal',emoji:'⚡',categories:[mk('6c9'),mk('6c10'),mk('6c11'),mk('6c12')]},
    {id:'fin',name:'¡La Gran Final!',emoji:'🏆',categories:[mk('6c13'),mk('6c14'),mk('6c15'),mk('6c16')]},
  ]};
}

async function loadFx(){try{const s=await getDoc(doc(db,CC,'fixture'));FX=s.exists()&&s.data().phases?s.data():dFx();}catch(e){FX=dFx();}}
async function saveFx(){try{await setDoc(doc(db,CC,'fixture'),FX);showT('✅ ¡Guardado y publicado!');}catch(e){showT('❌ Error al guardar');}}
async function saveS(s){try{await setDoc(doc(db,CS,s.id),{profile:s.profile,progress:s.progress,grades:s.grades||{},medals:s.medals||[],lastSeen:s.lastSeen,phase:s.phase,unlockedPhases:s.unlockedPhases||[0]});}catch(e){}}
function startLive(){try{unsub=onSnapshot(collection(db,CS),sn=>{students=[];sn.forEach(d=>students.push({id:d.id,...d.data()}));updBdg();rStudents();});}catch(e){}}

const rac=(cat)=>[...cat.activities,cat.game];
const aac=(cat)=>[...cat.activities,cat.game,...(cat.extras||[])];
const rap=(pi)=>FX.phases[pi].categories.flatMap(rac);
function phP(pr,pi){const a=rap(pi),d=a.filter(x=>pr&&pr[x.id]).length;return{done:d,total:a.length,pct:Math.round(d/a.length*100)};}
const trd=(pr)=>FX.phases.flatMap((_,i)=>rap(i)).filter(a=>pr&&pr[a.id]).length;
const tra=()=>FX.phases.flatMap((_,i)=>rap(i)).length;
const unl=(s,i)=>(s.unlockedPhases||[0]).includes(i);
const phC=(s,i)=>phP(s.progress,i).done===phP(s.progress,i).total;
function fmtL(ls){if(!ls)return 'Nunca';const d=new Date(ls),now=new Date(),df=Math.floor((now-d)/60000);if(df<1)return 'Ahora';if(df<60)return `Hace ${df}min`;if(df<1440)return `Hace ${Math.floor(df/60)}h`;return d.toLocaleDateString('es-AR');}
const isT=(ls)=>ls&&new Date(ls).toDateString()===new Date().toDateString();
function dlI(d){if(!d)return null;const dt=new Date(d),now=new Date(),df=Math.ceil((dt-now)/86400000);if(df<0)return{l:`Venció hace ${Math.abs(df)}d`,c:'red'};if(df<=3)return{l:`Vence en ${df}d`,c:'gold'};return{l:dt.toLocaleDateString('es-AR'),c:'green'};}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function getPend(s){const r=[];FX.phases.forEach(ph=>ph.categories.forEach(cat=>{rac(cat).forEach(act=>{if(s.progress&&s.progress[act.id]&&!(s.grades&&s.grades[act.id]))r.push({act,catName:cat.name||'Categoría'});});}));return r;}
function updBdg(){let t=0;students.forEach(s=>t+=getPend(s).length);const b=document.getElementById('pendBdg');b.textContent=t;b.style.display=t?'':'none';}

window.doLogin=async()=>{
  if(document.getElementById('passInp').value===PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').classList.add('active');
    await loadFx();rEditor();startLive();rBracket();rDeadlines();rActView();rPodio();
  }else{document.getElementById('loginErr').style.display='block';}
};
window.doLogout=()=>{if(unsub)unsub();document.getElementById('appScreen').classList.remove('active');document.getElementById('loginScreen').style.display='flex';document.getElementById('passInp').value='';};

window.goTab=(id)=>{
  const ids=['Students','ToCorrect','Bracket','ActView','Deadlines','Editor','Podio'];
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',ids[i]===id));
  document.querySelectorAll('.tab-pane').forEach((c,i)=>c.classList.toggle('active',ids[i]===id));
  if(id==='ToCorrect')rToCorrect();if(id==='Bracket')rBracket();if(id==='ActView')rActView();if(id==='Deadlines')rDeadlines();if(id==='Podio')rPodio();
};

window.setFilt=(f)=>{filt=f;document.querySelectorAll('[data-f]').forEach(b=>b.classList.toggle('active',b.dataset.f===f));rStudents();};

function rStudents(){
  const el=document.getElementById('tabStudents');
  const tot=students.length,active=students.filter(s=>isT(s.lastSeen)).length,ta=tra();
  const avg=tot?students.reduce((a,s)=>a+trd(s.progress),0)/tot:0;
  const q=(document.getElementById('sSearch')?.value||'').toLowerCase();
  let list=students.filter(s=>s.id.toLowerCase().includes(q));
  if(filt==='ahead')list=list.filter(s=>trd(s.progress)>=avg);
  if(filt==='behind')list=list.filter(s=>trd(s.progress)<avg&&trd(s.progress)>0);
  if(filt==='pending')list=list.filter(s=>getPend(s).length>0);
  list.sort((a,b)=>trd(b.progress)-trd(a.progress));
  const stats=`<div class="stats-bar"><div class="sbox"><span class="sn">${tot}</span><span class="sl">alumnos</span></div><div class="sbox"><span class="sn">${active}</span><span class="sl">activos hoy</span></div><div class="sbox"><span class="sn">${tot?Math.round(avg/ta*100):0}%</span><span class="sl">promedio</span></div><div class="sbox"><span class="sn">${students.filter(s=>getPend(s).length>0).length}</span><span class="sl">para corregir</span></div></div>`;
  const filters=`<div class="filter-bar"><input id="sSearch" type="text" placeholder="🔍 Buscar alumno..." oninput="rStudents()"><button class="f-btn ${filt==='all'?'active':''}" data-f="all" onclick="setFilt('all')">Todos</button><button class="f-btn ${filt==='ahead'?'active':''}" data-f="ahead" onclick="setFilt('ahead')">✅ Adelantados</button><button class="f-btn ${filt==='behind'?'active':''}" data-f="behind" onclick="setFilt('behind')">⚠️ Necesitan ayuda</button><button class="f-btn ${filt==='pending'?'active':''}" data-f="pending" onclick="setFilt('pending')">📬 Para corregir</button></div>`;
  if(!list.length){el.innerHTML=`<div class="pw">${stats}${filters}<div style="text-align:center;padding:3rem;color:var(--muted)"><div style="font-size:2.5rem">🔍</div><p style="font-weight:700;margin-top:.5rem">Sin alumnos todavía</p></div></div>`;return;}
  const cards=list.map(s=>{
    const d=trd(s.progress),pct=Math.round(d/ta*100),p=s.profile||{},ahead=d>=avg,pend=getPend(s).length;
    const pi=Math.max(0,...(s.unlockedPhases||[0])),ph=FX.phases[pi];
    const cats=FX.phases[pi].categories.map(cat=>{const cd=rac(cat).filter(a=>s.progress&&s.progress[a.id]).length;const cls=cd===rac(cat).length?'done':cd>0?'partial':'todo';return `<span class="sc-cat ${cls}">${cat.icon}</span>`;}).join('');
    return `<div class="sc ${ahead?'ahead':d<avg&&d>0?'behind':''} ${pend?'pending':''}" onclick="openDet('${s.id}')">
      <div style="display:flex;align-items:center;gap:.55rem;margin-bottom:.6rem">
        <div style="font-size:1.2rem;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:${p.color||'#dbeafe'}22;border:2px solid ${p.color||'#60a5fa'}44">${p.avatar||'🧑'}</div>
        <div style="flex:1"><div style="font-weight:900;font-size:.88rem">${s.id}</div><div style="font-size:.67rem;color:var(--muted);font-weight:700">${isT(s.lastSeen)?'🟢 ':''} ${fmtL(s.lastSeen)}</div></div>
        ${pend?`<span class="pb-b">📬 ${pend}</span>`:''}
        <span style="font-size:.68rem;font-weight:800;padding:.15rem .45rem;border-radius:999px;background:${PC[pi]}15;color:${PC[pi]}">${ph.emoji} ${RN[pi]}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:.25rem"><span style="font-size:.68rem;font-weight:800;color:var(--muted)">Progreso</span><span style="font-size:.75rem;font-weight:900;color:var(--blue)">${pct}% (${d}/${ta})</span></div>
      <div class="sc-bar"><div class="sc-bar-f" style="width:${pct}%;background:${PC[pi]}"></div></div>
      <div class="sc-cats">${cats}</div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="pw">${stats}${filters}<div class="sg">${cards}</div></div>`;
}

function rToCorrect(){
  const el=document.getElementById('tabToCorrect');
  const pend=[];students.forEach(s=>getPend(s).forEach(({act,catName})=>pend.push({s,act,catName})));

      <div style="font-weight:900;font-size:.88rem;margin-bottom:.6rem">${act.type==='juego'?'🎮':'✏️'} ${act.name}</div>

        <button class="gb" id="${gk}_excelente" onclick="selG('${s.id}','${act.id}','excelente','${gk}')">⭐ Excelente</button>
        <button class="gb" id="${gk}_muyBien" onclick="selG('${s.id}','${act.id}','muyBien','${gk}')">✅ Muy bien</button>
        <button class="gb" id="${gk}_enProceso" onclick="selG('${s.id}','${act.id}','enProceso','${gk}')">📝 En proceso</button>
        <button class="gb" id="${gk}_rehacer" onclick="selG('${s.id}','${act.id}','rehacer','${gk}')">🔄 Rehacer</button>

  el.innerHTML=`<div class="pw"><div style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--blue);margin-bottom:.9rem">📬 Para corregir (${pend.length})</div>${html}</div>`;
}
window.selG=(sid,actId,grade,gk)=>{gSel[`${sid}_${actId}`]=grade;['excelente','muyBien','enProceso','rehacer'].forEach(g=>{const b=document.getElementById(`${gk}_${g}`);if(b){b.className='gb';if(g===grade)b.classList.add(`sel-${g}`);}});};
window.saveG=async(sid,actId,gk)=>{const grade=gSel[`${sid}_${actId}`];if(!grade){showT('⚠️ Elegí una calificación');return;}const fb=document.getElementById(`${gk}_fb`)?.value||'';const s=students.find(x=>x.id===sid);if(!s)return;if(!s.grades)s.grades={};s.grades[actId]=grade;if(fb)s.grades[`${actId}_feedback`]=fb;if(GI[grade]?.m){if(!s.medals)s.medals=[];const mid=`grade_${actId}_${grade}`;if(!s.medals.includes(mid))s.medals.push(mid);}await saveS(s);showT(`✅ Calificación guardada para ${sid}`);rToCorrect();updBdg();};

function rBracket(){
  if(!FX)return;
  const SP=[0,40,130,310];
  const avgP=(pi,ci)=>{if(!students.length)return 0;const cat=FX.phases[pi].categories[ci],acts=rac(cat);return Math.round(students.reduce((a,s)=>a+Math.round(acts.filter(x=>s.progress&&s.progress[x.id]).length/acts.length*100),0)/students.length);};
  let h=`<div class="pw"><div class="bk-scroll"><div class="bk-row">`;
  FX.phases.forEach((ph,pi)=>{
    h+=`<div class="bk-col"><div class="bk-lbl"><span style="color:${PC[pi]}">${ph.emoji} ${RN[pi]}</span></div><div class="bk-matches" style="gap:${SP[pi]}px">`;
    ph.categories.forEach((cat,ci)=>{const avg=avgP(pi,ci);const pCol=avg===100?'#16a34a':avg>0?'#2563eb':'#94a3b8';const cn=cat.name||`Categoría ${ci+1}`;h+=`<div class="bk-match"><div class="bk-card ${avg===100?'done-c':avg>0?'in-p':''}"><span style="font-size:.9rem">${cat.icon}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.73rem">${cn}</span><span style="font-size:.65rem;font-weight:900;color:${pCol}">${avg}%</span></div></div>`;});
    h+=`</div></div>`;if(pi<3)h+=`<div class="bk-conn"></div>`;
  });
  const ch=students.filter(s=>FX.phases.every((_,i)=>phP(s.progress,i).pct===100&&unl(s,i)));
  h+=`<div class="bk-champ"><div style="font-size:2.5rem;margin-bottom:.4rem;filter:drop-shadow(0 0 10px rgba(245,158,11,.8))">🏆</div><div style="background:linear-gradient(135deg,#fffbeb,#fef3c7);border:2px solid #f59e0b;border-radius:14px;padding:.7rem .6rem;text-align:center;width:100%"><div style="font-family:'Fredoka One',cursive;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:#d97706;margin-bottom:.25rem">Campeones</div><div style="font-weight:900;font-size:.75rem;color:#92400e">${ch.length?ch.map(s=>(s.profile?.avatar||'🧑')+' '+s.id).join(', '):'Nadie aún'}</div></div></div></div></div></div>`;
  document.getElementById('tabBracket').innerHTML=h;
}

window.setAvPh=(i)=>{avPh=i;rActView();};
function rActView(){
  if(!FX)return;
  const phNav=`<div style="margin-bottom:1rem">${FX.phases.map((p,i)=>`<button class="av-ph-btn ${i===avPh?'active':''}" onclick="setAvPh(${i})">${p.emoji} ${p.name}</button>`).join('')}</div>`;
  const ph=FX.phases[avPh];
  const cats=ph.categories.map(cat=>{
    const allActs=aac(cat);
    const rows=allActs.map(act=>{const dn=students.filter(s=>s.progress&&s.progress[act.id]),pn=students.filter(s=>!(s.progress&&s.progress[act.id])),pct=students.length?Math.round(dn.length/students.length*100):0,isG=act.type==='juego',isE=act.type==='extra';
      return `<div class="av-act-row ${isG?'game':''} ${isE?'extra':''}"><span style="font-size:.9rem">${isG?'🎮':isE?'⭐':'✏️'}</span><div style="flex:1"><div style="font-weight:900;font-size:.78rem;margin-bottom:.2rem">${act.name}</div><div style="font-size:.7rem;color:var(--green);font-weight:800">✅ ${dn.length?dn.map(s=>s.id).join(', '):'Ninguno aún'}</div>${pn.length?`<div style="font-size:.7rem;color:var(--red);font-weight:700">⬜ Falta: ${pn.map(s=>s.id).join(', ')}</div>`:''}</div><span style="font-weight:900;color:var(--blue);font-size:.78rem">${pct}%</span></div>`;}).join('');

  }).join('');
  document.getElementById('tabActView').innerHTML=`<div class="pw"><div style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--blue);margin-bottom:.9rem">📊 Progreso por actividad</div>${phNav}${cats}</div>`;
}

function rDeadlines(){

  let h=`<div class="pw"><div style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--blue);margin-bottom:.9rem">📅 Fechas de entrega</div>`;
  FX.phases.forEach((ph,pi)=>{h+=`<div class="card" style="margin-bottom:1rem"><div style="font-family:'Fredoka One',cursive;font-size:.95rem;color:${PC[pi]};margin-bottom:.7rem">${ph.emoji} ${ph.name}</div><table class="dl-table"><thead><tr><th>Categoría</th><th>Actividad</th><th>Fecha</th><th>Estado</th></tr></thead><tbody>`;
    ph.categories.forEach(cat=>{const cn=cat.name||'Categoría';aac(cat).forEach(act=>{const dl=dlI(act.deadline);h+=`<tr><td>${cat.icon} ${cn}</td><td>${act.name}</td><td>${act.deadline?new Date(act.deadline).toLocaleDateString('es-AR'):'—'}</td><td>${dl?`<span class="chip ${dl.c}">${dl.l}</span>`:'<span class="chip gray">Sin fecha</span>'}</td></tr>`;});});
    h+=`</tbody></table></div>`;});

  const phNav=`<div style="margin-bottom:1.2rem">${FX.phases.map((p,i)=>`<button class="av-ph-btn ${i===edPh?'active':''}" onclick="setEdPh(${i})">${p.emoji} ${p.name}</button>`).join('')}</div>`;

      </div>
      <div class="ed-sec acts"><h4>✏️ Actividades (obligatorias)</h4>

          <div class="f-row"><div class="fg" style="flex:2"><label>Nombre</label><input class="fi" value="${esc(act.name)}" oninput="updAct(${edPh},${ci},${ai},'name',this.value)"></div><div class="fg"><label>Tipo</label><select class="fs" onchange="updAct(${edPh},${ci},${ai},'type',this.value)">${['actividad','video','apunte'].map(t=>`<option value="${t}"${t===act.type?' selected':''}>${TL[t]||t}</option>`).join('')}</select></div></div>
          <div class="f-row"><div class="fg" style="flex:3"><label>Link</label><input class="fi" placeholder="https://..." value="${esc(act.link)}" oninput="updAct(${edPh},${ci},${ai},'link',this.value)"></div><div class="fg"><label>📅 Fecha límite</label><input class="fi dl-f" type="date" value="${act.deadline||''}" oninput="updAct(${edPh},${ci},${ai},'deadline',this.value)"></div></div>
          <div class="f-row"><div class="fg"><label>Descripción</label><textarea class="ft" oninput="updAct(${edPh},${ci},${ai},'desc',this.value)">${esc(act.desc)}</textarea></div></div>

function rPodio(){
  if(!FX)return;
  const ta=tra(),sorted=[...students].sort((a,b)=>trd(b.progress)-trd(a.progress)).slice(0,10),top3=sorted.slice(0,3),meds=['🥇','🥈','🥉'],ords=[1,0,2];
  let podH='';
  if(top3.length){
    const places=ords.map(i=>top3[i]).filter(Boolean);
    podH=`<div class="podio-wrap"><div style="font-family:'Fredoka One',cursive;font-size:1.5rem;color:#fff;margin-bottom:1.2rem">🏆 Podio de la clase</div><div class="podio-places">`;
    places.forEach((s,vi)=>{const ri=ords[vi],p=s?.profile||{},pct=Math.round(trd(s?.progress)/ta*100);podH+=`<div class="podio-place"><div class="podio-av" style="background:${p.color||'#dbeafe'}22;border:2px solid ${p.color||'#60a5fa'}66">${p.avatar||'🧑'}</div><div style="font-weight:900;font-size:.82rem;color:#fff;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s?.id||'—'}</div><div style="font-family:'Fredoka One',cursive;font-size:1rem;color:#fbbf24">${pct}%</div><div class="podio-ped ${ri===0?'first':ri===1?'second':'third'}"><span style="font-size:1.5rem">${meds[ri]}</span></div></div>`;});
    podH+=`</div></div>`;
  }
  const rows=sorted.map((s,i)=>{const p=s.profile||{},pct=Math.round(trd(s.progress)/ta*100);return `<div style="display:flex;align-items:center;gap:.7rem;padding:.45rem 0;border-bottom:1px solid var(--border)"><span style="font-weight:900;font-size:.85rem;min-width:20px;color:var(--muted)">${i+1}</span><span style="font-size:1.1rem">${p.avatar||'🧑'}</span><span style="font-weight:900;font-size:.85rem;flex:1">${s.id}</span><span style="font-size:.75rem;font-weight:900;color:var(--blue)">${pct}%</span></div>`;}).join('');
  const tog=`<div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem"><span style="font-weight:800;font-size:.85rem">Mostrar podio a los alumnos</span><button class="btn ${podioOn?'btn-green':'btn-outline'}" onclick="togPodio()">${podioOn?'✅ Activado':'⬜ Desactivado'}</button></div>`;
  document.getElementById('tabPodio').innerHTML=`<div class="pw">${tog}${podH}<div class="card"><div style="font-family:'Fredoka One',cursive;font-size:.95rem;color:var(--blue);margin-bottom:.5rem">Tabla completa</div>${rows}</div></div>`;
}
window.togPodio=async()=>{podioOn=!podioOn;try{await setDoc(doc(db,CC,'podio'),{enabled:podioOn});}catch(e){}rPodio();showT(podioOn?'🥇 Podio activado':'Podio desactivado');};

window.openDet=(name)=>{
  const s=students.find(x=>x.id===name);if(!s)return;
  const ta2=tra(),done=trd(s.progress),pct=Math.round(done/ta2*100),p=s.profile||{};
  const uph=s.unlockedPhases||[0],maxU=Math.max(...uph),canU=maxU<3&&phC(s,maxU);
  let h=`<div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)"><div style="font-size:1.8rem;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:${p.color||'#dbeafe'}22;border:2px solid ${p.color||'#60a5fa'}44">${p.avatar||'🧑'}</div><div><div style="font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--blue)">${s.id}</div><div style="color:var(--muted);font-size:.78rem;font-weight:700">${pct}% completado · ${fmtL(s.lastSeen)}</div></div></div>`;
  h+=`<div style="background:var(--blue-l);border:1.5px solid rgba(37,99,235,.2);border-radius:12px;padding:.8rem 1rem;margin-bottom:1rem"><div style="font-weight:900;font-size:.85rem;color:var(--blue);margin-bottom:.6rem">🔓 Fases habilitadas</div><div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.6rem">`;
  FX.phases.forEach((ph,i)=>{const u=uph.includes(i),c=phC(s,i);h+=`<span class="chip ${u?'green':'gray'}">${ph.emoji} ${ph.name} ${u?(c?'✅':'🔓'):'🔒'}</span>`;});
  h+=`</div>`;
  if(canU){const nph=FX.phases[maxU+1];h+=`<button class="btn btn-green" onclick="unlkPh('${s.id}',${maxU+1})">🔓 Habilitar ${nph.emoji} ${nph.name}</button>`;}
  else if(maxU===3)h+=`<span style="font-size:.8rem;font-weight:700;color:var(--green)">✅ Todas las fases habilitadas</span>`;
  else h+=`<span style="font-size:.78rem;font-weight:700;color:var(--muted)">Debe completar todas las actividades de la fase actual primero</span>`;
  h+=`</div>`;
  FX.phases.forEach((ph,pi)=>{const u=uph.includes(pi),pp2=phP(s.progress,pi);if(!u){h+=`<div style="padding:.4rem 0;font-size:.8rem;color:var(--muted)">🔒 ${ph.emoji} ${ph.name} — bloqueada</div>`;return;}h+=`<div style="margin-bottom:.9rem"><div style="font-weight:900;font-size:.85rem;color:${PC[pi]};margin-bottom:.4rem">${ph.emoji} ${ph.name} — ${pp2.done}/${pp2.total}</div><div style="background:#f1f5f9;border-radius:999px;height:5px;overflow:hidden;margin-bottom:.4rem"><div style="height:100%;border-radius:999px;background:${PC[pi]};width:${pp2.pct}%"></div></div>`;
    ph.categories.forEach(cat=>{const acts=aac(cat),cd=acts.filter(a=>s.progress&&s.progress[a.id]).length,cn=cat.name||'Categoría';h+=`<div style="font-size:.73rem;font-weight:900;color:var(--muted);margin:.3rem 0 .15rem">${cat.icon} ${cn}</div>`;acts.forEach(act=>{const d=s.progress&&s.progress[act.id],g=s.grades&&s.grades[act.id],isG=act.type==='juego',isE=act.type==='extra';h+=`<div style="display:flex;align-items:center;gap:.4rem;font-size:.73rem;font-weight:700;padding:.2rem .4rem;border-radius:6px;background:${d?'#f0fdf4':'#f8fafc'};margin-bottom:.15rem"><span>${d?'✅':'⬜'}</span><span style="flex:1">${isG?'🎮 ':isE?'⭐ ':''}${act.name}</span>${g?`<span class="chip ${g==='excelente'?'gold':g==='muyBien'?'green':g==='enProceso'?'blue':'red'}">${GI[g].e} ${GI[g].l}</span>`:''}</div>`;});});
    h+=`</div>`;});
  document.getElementById('detPan').innerHTML=`<button class="det-x" onclick="closeDet()">✕</button>${h}`;
  document.getElementById('detOv').classList.add('open');
};
window.unlkPh=async(sid,pi)=>{const s=students.find(x=>x.id===sid);if(!s)return;if(!s.unlockedPhases)s.unlockedPhases=[0];if(!s.unlockedPhases.includes(pi))s.unlockedPhases.push(pi);await saveS(s);showT(`🔓 ${FX.phases[pi].name} habilitada para ${sid}`);closeDet();openDet(sid);};
window.closeDet=(e)=>{if(!e||e.target===document.getElementById('detOv'))document.getElementById('detOv').classList.remove('open');};

window.openProj=()=>{
  if(!FX||!students.length){showT('Sin datos para proyectar');return;}
  const ta2=tra(),sorted=[...students].sort((a,b)=>trd(b.progress)-trd(a.progress)),top3=sorted.slice(0,3),meds=['🥇','🥈','🥉'],ords=[1,0,2];
  const places=ords.map(i=>top3[i]).filter(Boolean);
  document.getElementById('projPodio').innerHTML=places.map((s,vi)=>{const ri=ords[vi],p=s.profile||{},pct=Math.round(trd(s.progress)/ta2*100);return `<div style="display:flex;flex-direction:column;align-items:center;gap:.5rem"><span style="font-size:2rem">${meds[ri]}</span><div style="font-size:3rem;width:72px;height:72px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:${p.color||'#1e3a5f'}33;border:3px solid ${p.color||'#60a5fa'}66">${p.avatar||'🧑'}</div><div style="font-weight:900;font-size:1.1rem;color:#fff">${s.id}</div><div style="font-family:'Fredoka One',cursive;font-size:1.2rem;color:#f59e0b">${pct}%</div></div>`;}).join('');
  document.getElementById('projBars').innerHTML=sorted.slice(0,8).map(s=>{const p=s.profile||{},pct=Math.round(trd(s.progress)/ta2*100);return `<div style="display:flex;align-items:center;gap:1rem;margin-bottom:.7rem"><div style="font-weight:900;color:#fff;min-width:140px;font-size:.95rem">${p.avatar||'🧑'} ${s.id}</div><div style="flex:1;background:rgba(255,255,255,.1);border-radius:999px;height:18px;overflow:hidden"><div style="height:100%;border-radius:999px;background:linear-gradient(90deg,#60a5fa,#a78bfa);width:${pct}%"></div></div><div style="font-weight:900;color:#fff;min-width:45px;text-align:right;font-size:.9rem">${pct}%</div></div>`;}).join('');
  document.getElementById('projectionScreen').classList.add('open');
};
window.closeProj=()=>document.getElementById('projectionScreen').classList.remove('open');

window.expXls=()=>{if(!students.length){showT('Sin datos');return;}const ta2=tra();let csv='Alumno,Progreso %,Completadas,Fase actual\n';students.forEach(s=>{const d=trd(s.progress),pct=Math.round(d/ta2*100),pi=Math.max(0,...(s.unlockedPhases||[0]));csv+=`${s.id},${pct}%,${d}/${ta2},${FX.phases[pi]?.name||'—'}\n`;});const b=new Blob([csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='fixture-6to-progreso.csv';a.click();showT('📤 Exportado');};

function showT(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
